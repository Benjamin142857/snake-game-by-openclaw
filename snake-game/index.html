<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大冒险 v4.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif; color: white;
        }
        h1 {
            margin-bottom: 10px; font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(90deg, #00ff88, #00d4ff, #ff6b6b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .game-wrapper { display: flex; gap: 20px; align-items: flex-start; }
        .game-container { position: relative; }
        #gameCanvas {
            border: 4px solid #0f3460; border-radius: 10px;
            box-shadow: 0 0 30px rgba(15, 52, 96, 0.5);
            background: #0a0a1a;
        }
        .sidebar {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; width: 190px;
        }
        .sidebar h3 { margin-bottom: 10px; color: #00ff88; font-size: 1rem; }
        .stat-item { margin: 8px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .progress-bar {
            width: 100%; height: 8px; background: #1a1a2e; border-radius: 4px; overflow: hidden; margin-top: 5px;
        }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00d4ff); transition: width 0.3s; }
        .item-slot {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; background: rgba(255,255,255,0.1);
            border: 2px solid #0f3460; border-radius: 6px; margin: 3px; cursor: pointer;
            font-size: 18px; flex-direction: column;
        }
        .item-slot:hover { background: rgba(255,255,255,0.2); }
        .item-slot:disabled { opacity: 0.3; cursor: not-allowed; }
        .item-count { font-size: 10px; margin-top: -2px; }
        .mission-box {
            background: rgba(255,215,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px;
            border: 1px solid #ffd700;
        }
        .status-bar {
            display: flex; gap: 20px; margin-top: 15px; font-size: 1rem;
            background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 8px;
        }
        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 25px; border-radius: 15px; text-align: center;
            display: none; border: 2px solid #e94560; z-index: 100; min-width: 300px;
        }
        .modal h2 { color: #e94560; margin-bottom: 15px; font-size: 1.3rem; }
        .shop-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; background: rgba(255,255,255,0.1); margin: 5px 0; border-radius: 5px;
        }
        .shop-item:hover { background: rgba(255,255,255,0.2); }
        .shop-item-info { text-align: left; }
        .shop-item-name { font-size: 0.85rem; }
        .shop-item-desc { font-size: 0.7rem; color: #a0a0a0; }
        .btn {
            margin: 5px; padding: 10px 18px; font-size: 0.85rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-green { background: linear-gradient(90deg, #00ff88, #00cc6a); }
        .btn-blue { background: linear-gradient(90deg, #00d4ff, #0099cc); }
        .btn-yellow { background: linear-gradient(90deg, #ffd93d, #f9a825); }
        .effect-banner {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85);
            padding: 6px 10px; border-radius: 5px; font-size: 0.75rem; display: none;
        }
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 8px 16px; border-radius: 6px;
            z-index: 1000; animation: slideDown 0.3s ease; font-size: 0.9rem;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .controls { margin-top: 15px; text-align: center; color: #a0a0a0; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇大冒险 v4.0</h1>
    
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div class="effect-banner" id="effectBanner"></div>
            
            <div class="modal" id="gameOver">
                <h2>💀 游戏结束!</h2>
                <p id="finalScore"></p>
                <p id="earnedCoins"></p>
                <button class="btn btn-green" onclick="restartGame()">再来一局</button>
                <button class="btn btn-blue" onclick="openShop()">商城</button>
            </div>
            
            <div class="modal" id="shopModal">
                <h2>🏪 商城</h2>
                <p>金币: <span id="shopCoins">0</span> 🪙</p>
                <div id="shopItems"></div>
                <button class="btn" onclick="closeShop()">关闭</button>
            </div>
            
            <div class="modal" id="startModal" style="display:block">
                <h2>🐍 贪吃蛇大冒险 v4.0</h2>
                <p style="font-size: 0.9rem; color: #a0a0a0; margin: 10px 0;">
                    🎁 道具 | 👾 敌人 | 🏗️ 障碍物<br>
                    🚪 传送门 | 💰 金币 | 🏪 商城 | ⭐ 等级
                </p>
                <button class="btn btn-green" onclick="startGame()">开始游戏</button>
                <button class="btn btn-blue" onclick="openShop()">商城</button>
            </div>
        </div>
        
        <div class="sidebar">
            <h3>📊 状态</h3>
            <div class="stat-item"><span>🏆 分数</span><span id="score">0</span></div>
            <div class="stat-item"><span>💰 金币</span><span id="coins">0</span></div>
            <div class="stat-item"><span>⭐ 等级</span><span id="level">1</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="expBar" style="width: 0%"></div>
            </div>
            <div style="font-size: 0.7rem; color: #a0a0a0; margin-top: 3px;">下一级: <span id="nextLevelExp">100</span></div>
            
            <h3 style="margin-top: 12px;">🎒 道具 (1-6)</h3>
            <div id="inventory">
                <button class="item-slot" id="slot-speed" title="加速 (1)" onclick="useItem('speed')">⚡<span class="item-count" id="count-speed"></span></button>
                <button class="item-slot" id="slot-slow" title="减速 (2)" onclick="useItem('slow')">🐢<span class="item-count" id="count-slow"></span></button>
                <button class="item-slot" id="slot-ghost" title="穿墙 (3)" onclick="useItem('ghost')">👻<span class="item-count" id="count-ghost"></span></button>
                <button class="item-slot" id="slot-shield" title="护盾 (4)" onclick="useItem('shield')">🛡️<span class="item-count" id="count-shield"></span></button>
                <button class="item-slot" id="slot-magnet" title="磁铁 (5)" onclick="useItem('magnet')">🧲<span class="item-count" id="count-magnet"></span></button>
                <button class="item-slot" id="slot-double" title="双倍 (6)" onclick="useItem('double')">✨<span class="item-count" id="count-double"></span></button>
            </div>
            
            <div class="mission-box">
                <h3>📋 当前任务</h3>
                <p id="missionText">收集 3 个金币</p>
                <p style="font-size: 0.8rem; color: #ffd700;">进度: <span id="missionProgress">0</span>/3</p>
            </div>
            
            <h3 style="margin-top: 12px;">🎮 控制</h3>
            <p style="font-size: 0.75rem; color: #a0a0a0;">
                方向键/WASD移动<br>
                空格暂停 | 1-6用道具
            </p>
        </div>
    </div>
    
    <div class="status-bar">
        <div>🏆 分数: <span id="scoreDisplay">0</span></div>
        <div>💰 金币: <span id="coinsDisplay">0</span></div>
        <div>⭐ 等级: <span id="levelDisplay">1</span></div>
    </div>
    
    <div class="controls">
        <button class="btn btn-green" onclick="startGame()">开始游戏</button>
        <button class="btn btn-blue" onclick="openShop()">商城</button>
        <button class="btn" onclick="togglePause()">暂停</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let coins = 0;
        let level = 1;
        let exp = 0;
        let expToNextLevel = 100;
        let isPaused = false;
        let isGameOver = false;
        let gameLoop = null;
        let gameSpeed = 100;
        
        let obstacles = [];
        let portals = [];
        let coinItems = [];
        let powerUps = [];
        let enemies = [];
        let activeEffects = {};
        let inventory = { speed: 0, slow: 0, ghost: 0, shield: 0, magnet: 0, double: 0 };
        let permanentUpgrades = { startLength: 0, startSpeed: 0, coinBonus: 0 };
        let missionProgress = 0;
        let missionTarget = 3;
        
        const shopItemsData = [
            { id: 'speed', name: '加速道具', price: 50, icon: '⚡', type: 'consumable', desc: '移动速度翻倍5秒' },
            { id: 'slow', name: '减速道具', price: 30, icon: '🐢', type: 'consumable', desc: '敌人移动减速5秒' },
            { id: 'ghost', name: '穿墙道具', price: 80, icon: '👻', type: 'consumable', desc: '可以穿墙5秒' },
            { id: 'shield', name: '护盾道具', price: 100, icon: '🛡️', type: 'consumable', desc: '免疫一次伤害' },
            { id: 'magnet', name: '磁铁道具', price: 60, icon: '🧲', type: 'consumable', desc: '自动吸引金币5秒' },
            { id: 'double', name: '双倍道具', price: 120, icon: '✨', type: 'consumable', desc: '分数金币翻倍10秒' },
            { id: 'startLength', name: '初始长度+1', price: 200, icon: '📏', type: 'permanent', desc: '永久增加初始长度' },
            { id: 'startSpeed', name: '移速提升', price: 300, icon: '🏃', type: 'permanent', desc: '永久提升移动速度' },
            { id: 'coinBonus', name: '金币加成', price: 250, icon: '💰', type: 'permanent', desc: '金币获取+20%' }
        ];
        
        function loadSave() {
            try {
                const save = localStorage.getItem('snakeSave');
                if (save) {
                    const data = JSON.parse(save);
                    coins = data.coins || 0;
                    inventory = data.inventory || inventory;
                    permanentUpgrades = data.permanentUpgrades || permanentUpgrades;
                }
            } catch(e) {}
            updateUI();
        }
        
        function saveSave() {
            try {
                localStorage.setItem('snakeSave', JSON.stringify({ coins, inventory, permanentUpgrades }));
            } catch(e) {}
        }
        
        function showNotification(text, type = 'info') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.style.color = type === 'success' ? '#00ff88' : type === 'error' ? '#ff6b6b' : '#ffd93d';
            notif.textContent = text;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 1800);
        }
        
        function generateObstacles() {
            obstacles = [];
            const obstacleCount = Math.min(level + 3, 15);
            for (let i = 0; i < obstacleCount; i++) {
                let pos;
                do {
                    pos = {
                        x: Math.floor(Math.random() * (tileCount - 6)) + 3,
                        y: Math.floor(Math.random() * (tileCount - 6)) + 3
                    };
                } while (
                    (pos.x >= 12 && pos.x <= 18 && pos.y >= 12 && pos.y <= 18) ||
                    obstacles.some(o => o.x === pos.x && o.y === pos.y)
                );
                obstacles.push(pos);
            }
        }
        
        function generatePortals() {
            portals = [];
            let pos1, pos2;
            do {
                pos1 = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                (pos1.x >= 12 && pos1.x <= 18 && pos1.y >= 12 && pos1.y <= 18) ||
                obstacles.some(o => o.x === pos1.x && o.y === pos1.y)
            );
            do {
                pos2 = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                (pos2.x >= 12 && pos2.x <= 18 && pos2.y >= 12 && pos2.y <= 18) ||
                obstacles.some(o => o.x === pos2.x && o.y === pos2.y) ||
                (pos1.x === pos2.x && pos1.y === pos2.y)
            );
            portals = [pos1, pos2];
        }
        
        function spawnCoin() {
            if (coinItems.length >= 8) return;
            let pos;
            do {
                pos = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                snake.some(s => s.x === pos.x && s.y === pos.y) ||
                obstacles.some(o => o.x === pos.x && o.y === pos.y) ||
                coinItems.some(c => c.x === pos.x && c.y === pos.y) ||
                (food.x === pos.x && food.y === pos.y) ||
                portals.some(p => p.x === pos.x && p.y === pos.y) ||
                powerUps.some(p => p.x === pos.x && p.y === pos.y) ||
                enemies.some(e => e.x === pos.x && e.y === pos.y)
            );
            coinItems.push(pos);
        }
        
        function spawnPowerUp() {
            if (powerUps.length >= 4 || Math.random() > 0.25) return;
            const types = ['speed', 'slow', 'ghost', 'shield', 'magnet', 'double'];
            const icons = { speed: '⚡', slow: '🐢', ghost: '👻', shield: '🛡️', magnet: '🧲', double: '✨' };
            const type = types[Math.floor(Math.random() * types.length)];
            let pos;
            do {
                pos = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                snake.some(s => s.x === pos.x && s.y === pos.y) ||
                obstacles.some(o => o.x === pos.x && o.y === pos.y) ||
                coinItems.some(c => c.x === pos.x && c.y === pos.y) ||
                powerUps.some(p => p.x === pos.x && p.y === pos.y) ||
                (food.x === pos.x && food.y === pos.y) ||
                portals.some(p => p.x === pos.x && p.y === pos.y) ||
                enemies.some(e => e.x === pos.x && e.y === pos.y)
            );
            powerUps.push({ ...pos, type, icon: icons[type], lifetime: 600 });
        }
        
        function spawnEnemy() {
            const maxEnemies = Math.min(level + 1, 6);
            if (enemies.length >= maxEnemies || Math.random() > 0.08 + level * 0.015) return;
            let pos;
            do {
                pos = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                snake.some(s => Math.abs(s.x - pos.x) < 7 && Math.abs(s.y - pos.y) < 7) ||
                obstacles.some(o => o.x === pos.x && o.y === pos.y) ||
                enemies.some(e => e.x === pos.x && e.y === pos.y)
            );
            enemies.push({ ...pos, dx: Math.random() > 0.5 ? 1 : -1, dy: Math.random() > 0.5 ? 1 : -1, moveTimer: 0 });
        }
        
        function initGame() {
            const startLength = 1 + permanentUpgrades.startLength;
            snake = [];
            for (let i = 0; i < startLength; i++) {
                snake.push({ x: 15 - i, y: 15 });
            }
            direction = { x: 0, y: 0 };
            nextDirection = { x: 0, y: 0 };
            score = 0;
            exp = 0;
            level = 1;
            expToNextLevel = 100;
            missionProgress = 0;
            missionTarget = 3;
            isPaused = false;
            isGameOver = false;
            gameSpeed = Math.max(50, 100 - permanentUpgrades.startSpeed * 10);
            coinItems = [];
            powerUps = [];
            enemies = [];
            activeEffects = {};
            
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('effectBanner').style.display = 'none';
            document.getElementById('missionText').textContent = `收集 ${missionTarget} 个金币`;
            
            generateObstacles();
            generatePortals();
            spawnFood();
            for (let i = 0; i < 5; i++) spawnCoin();
            updateUI();
            draw();
        }
        
        function spawnFood() {
            do {
                food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                snake.some(s => s.x === food.x && s.y === food.y) ||
                obstacles.some(o => o.x === food.x && o.y === food.y) ||
                coinItems.some(c => c.x === food.x && c.y === food.y) ||
                powerUps.some(p => p.x === food.x && p.y === food.y) ||
                portals.some(p => p.x === food.x && p.y === food.y) ||
                enemies.some(e => e.x === food.x && e.y === food.y)
            );
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('coins').textContent = coins;
            document.getElementById('coinsDisplay').textContent = coins;
            document.getElementById('level').textContent = level;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('expBar').style.width = `${(exp / expToNextLevel) * 100}%`;
            document.getElementById('nextLevelExp').textContent = expToNextLevel;
            document.getElementById('missionProgress').textContent = missionProgress;
            
            ['speed', 'slow', 'ghost', 'shield', 'magnet', 'double'].forEach(type => {
                const countEl = document.getElementById(`count-${type}`);
                const slotEl = document.getElementById(`slot-${type}`);
                countEl.textContent = inventory[type] > 0 ? inventory[type] : '';
                slotEl.disabled = inventory[type] <= 0;
                slotEl.style.opacity = inventory[type] > 0 ? '1' : '0.3';
            });
        }
        
        function addExp(amount) {
            const doubleExp = activeEffects.double ? 2 : 1;
            exp += amount * doubleExp;
            while (exp >= expToNextLevel) {
                exp -= expToNextLevel;
                level++;
                expToNextLevel = Math.floor(expToNextLevel * 1.5);
                showNotification(`🎉 升级到 ${level} 级!`, 'success');
                gameSpeed = Math.max(40, gameSpeed - 3);
                if (gameLoop) {
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameTick, gameSpeed);
                }
            }
            updateUI();
        }
        
        function addCoins(amount) {
            const bonus = 1 + permanentUpgrades.coinBonus * 0.2;
            const doubleCoins = activeEffects.double ? 2 : 1;
            const earned = Math.floor(amount * bonus * doubleCoins);
            coins += earned;
            saveSave();
            updateUI();
            return earned;
        }
        
        function checkMissionComplete() {
            if (missionProgress >= missionTarget) {
                level++;
                missionProgress = 0;
                missionTarget = 3 + level;
                document.getElementById('missionText').textContent = `收集 ${missionTarget} 个金币`;
                generateObstacles();
                generatePortals();
                coinItems = [];
                powerUps = [];
                enemies = [];
                for (let i = 0; i < Math.min(level + 4, 8); i++) spawnCoin();
                showNotification(`🎯 任务完成！进入第 ${level} 关`, 'success');
            }
        }
        
        function updateEffects() {
            Object.keys(activeEffects).forEach(key => {
                if (activeEffects[key] > 0) {
                    activeEffects[key]--;
                    if (activeEffects[key] <= 0) delete activeEffects[key];
                }
            });
        }
        
        function updateEnemies() {
            const slowFactor = activeEffects.slow ? 2 : 1;
            enemies.forEach(enemy => {
                enemy.moveTimer++;
                if (enemy.moveTimer >= slowFactor * 3) {
                    enemy.moveTimer = 0;
                    if (Math.random() < 0.35) {
                        enemy.dx = Math.random() > 0.5 ? 1 : -1;
                        enemy.dy = Math.random() > 0.5 ? 1 : -1;
                    }
                    let newX = enemy.x + enemy.dx;
                    let newY = enemy.y + enemy.dy;
                    if (!obstacles.some(o => o.x === newX && o.y === newY)) {
                        enemy.x = newX;
                        enemy.y = newY;
                    } else {
                        enemy.dx *= -1;
                        enemy.dy *= -1;
                    }
                    if (enemy.x < 0) { enemy.x = tileCount - 1; enemy.dx *= -1; }
                    if (enemy.x >= tileCount) { enemy.x = 0; enemy.dx *= -1; }
                    if (enemy.y < 0) { enemy.y = tileCount - 1; enemy.dy *= -1; }
                    if (enemy.y >= tileCount) { enemy.y = 0; enemy.dy *= -1; }
                }
            });
        }
        
        function magnetEffect() {
            if (!activeEffects.magnet) return;
            const head = snake[0];
            coinItems.forEach(coin => {
                const dx = head.x - coin.x;
                const dy = head.y - coin.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 7 && dist > 0) {
                    coin.x += Math.sign(dx);
                    coin.y += Math.sign(dy);
                }
            });
        }
        
        function updateEffectBanner() {
            const banner = document.getElementById('effectBanner');
            const active = Object.entries(activeEffects).filter(([k, v]) => v > 0);
            if (active.length > 0) {
                banner.style.display = 'block';
                const icons = { speed: '⚡', slow: '🐢', ghost: '👻', shield: '🛡️', magnet: '🧲', double: '✨' };
                banner.innerHTML = active.map(([type, time]) => `${icons[type]}${Math.ceil(time / 10)}`).join(' ');
            } else {
                banner.style.display = 'none';
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#1a1a2e';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
            }
            
            obstacles.forEach(o => {
                ctx.fillStyle = '#4a4a6a';
                ctx.fillRect(o.x * gridSize + 2, o.y * gridSize + 2, gridSize - 4, gridSize - 4);
                ctx.strokeStyle = '#6a6a8a';
                ctx.lineWidth = 2;
                ctx.strokeRect(o.x * gridSize + 2, o.y * gridSize + 2, gridSize - 4, gridSize - 4);
            });
            
            portals.forEach((p, i) => {
                const color = i === 0 ? '#00d4ff' : '#ff6b6b';
                ctx.beginPath();
                ctx.arc(p.x * gridSize + gridSize / 2, p.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();
            });
            
            coinItems.forEach(c => {
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🪙', c.x * gridSize + gridSize / 2, c.y * gridSize + gridSize / 2 + 5);
            });
            
            powerUps.forEach(p => {
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.icon, p.x * gridSize + gridSize / 2, p.y * gridSize + gridSize / 2 + 5);
            });
            
            enemies.forEach(enemy => {
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('👾', enemy.x * gridSize + gridSize / 2, enemy.y * gridSize + gridSize / 2 + 5);
            });
            
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                let color1 = isHead ? '#00ff88' : '#00cc6a';
                let color2 = isHead ? '#00cc6a' : '#009950';
                if (activeEffects.shield && isHead) {
                    color1 = '#00d4ff';
                    color2 = '#0099cc';
                }
                if (activeEffects.ghost) ctx.globalAlpha = 0.6;
                
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2, 0,
                    segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2, gridSize / 2
                );
                gradient.addColorStop(0, color1);
                gradient.addColorStop(1, color2);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, isHead ? 8 : 4);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            
            if (activeEffects.shield) {
                const head = snake[0];
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(head.x * gridSize + gridSize / 2, head.y * gridSize + gridSize / 2, gridSize, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            if (isPaused && !isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸️ 暂停', canvas.width / 2, canvas.height / 2);
            }
        }
        
        function gameTick() {
            if (isPaused || isGameOver) { draw(); return; }
            
            direction = { ...nextDirection };
            if (direction.x === 0 && direction.y === 0) { draw(); return; }
            
            updateEffects();
            updateEnemies();
            magnetEffect();
            
            powerUps = powerUps.filter(p => { p.lifetime--; return p.lifetime > 0; });
            
            if (Math.random() < 0.02) spawnPowerUp();
            if (Math.random() < 0.018) spawnCoin();
            if (Math.random() < 0.012) spawnEnemy();
            
            let head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            const portalIndex = portals.findIndex(p => p.x === head.x && p.y === head.y);
            if (portalIndex !== -1) {
                const otherPortal = portals[1 - portalIndex];
                head = {
                    x: otherPortal.x + direction.x,
                    y: otherPortal.y + direction.y
                };
            }
            
            if (!activeEffects.ghost) {
                if (obstacles.some(o => o.x === head.x && o.y === head.y)) {
                    if (activeEffects.shield) {
                        delete activeEffects.shield;
                        nextDirection = { x: -direction.x, y: -direction.y };
                        showNotification('🛡️ 护盾抵消了伤害!', 'success');
                        draw();
                        return;
                    }
                    gameOver();
                    return;
                }
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    if (activeEffects.shield) {
                        delete activeEffects.shield;
                        nextDirection = { x: -direction.x, y: -direction.y };
                        showNotification('🛡️ 护盾抵消了伤害!', 'success');
                        draw();
                        return;
                    }
                    gameOver();
                    return;
                }
                if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                    if (activeEffects.shield) {
                        delete activeEffects.shield;
                        showNotification('🛡️ 护盾抵消了伤害!', 'success');
                        draw();
                        return;
                    }
                    gameOver();
                    return;
                }
            } else {
                if (head.x < 0) head.x = tileCount - 1;
                if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1;
                if (head.y >= tileCount) head.y = 0;
            }
            
            const hitEnemy = enemies.find(e => e.x === head.x && e.y === head.y);
            if (hitEnemy) {
                if (activeEffects.shield) {
                    delete activeEffects.shield;
                    enemies = enemies.filter(e => e !== hitEnemy);
                    showNotification('🛡️ 护盾消灭了敌人!', 'success');
                    addExp(50);
                } else {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                const points = 10 * level;
                score += points;
                addExp(points);
                spawnFood();
            } else {
                snake.pop();
            }
            
            const collectedPowerUp = powerUps.find(p => p.x === head.x && p.y === head.y);
            if (collectedPowerUp) {
                powerUps = powerUps.filter(p => p !== collectedPowerUp);
                inventory[collectedPowerUp.type]++;
                showNotification(`🎁 获得 ${collectedPowerUp.icon}!`, 'success');
                updateUI();
            }
            
            const collectedCoin = coinItems.findIndex(c => c.x === head.x && c.y === head.y);
            if (collectedCoin !== -1) {
                coinItems.splice(collectedCoin, 1);
                addCoins(1);
                missionProgress++;
                score += 5;
                addExp(10);
                spawnCoin();
                checkMissionComplete();
            }
            
            updateEffectBanner();
            updateUI();
            draw();
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            const earnedCoins = Math.floor(score / 10);
            addCoins(earnedCoins);
            document.getElementById('finalScore').textContent = `最终得分: ${score}`;
            document.getElementById('earnedCoins').textContent = `获得金币: +${earnedCoins} 🪙`;
            document.getElementById('gameOver').style.display = 'block';
            saveSave();
        }
        
        function startGame() {
            document.getElementById('startModal').style.display = 'none';
            initGame();
            nextDirection = { x: 1, y: 0 };
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, gameSpeed);
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        function togglePause() {
            if (!isGameOver) isPaused = !isPaused;
        }
        
        function useItem(type) {
            if (inventory[type] <= 0) {
                showNotification('❌ 没有该道具!', 'error');
                return;
            }
            inventory[type]--;
            const durations = { speed: 50, slow: 50, ghost: 50, shield: 1, magnet: 50, double: 100 };
            activeEffects[type] = (activeEffects[type] || 0) + durations[type];
            showNotification(`✨ 使用了道具!`, 'success');
            updateUI();
        }
        
        function openShop() {
            document.getElementById('shopCoins').textContent = coins;
            const shopDiv = document.getElementById('shopItems');
            shopDiv.innerHTML = shopItemsData.map(item => `
                <div class="shop-item">
                    <div class="shop-item-info">
                        <div class="shop-item-name">${item.icon} ${item.name}</div>
                        <div class="shop-item-desc">${item.desc}</div>
                    </div>
                    <button class="btn btn-yellow" style="padding:6px 12px;font-size:0.8rem;" onclick="buyItem('${item.id}')">${item.price}🪙</button>
                </div>
            `).join('');
            document.getElementById('shopModal').style.display = 'block';
        }
        
        function closeShop() {
            document.getElementById('shopModal').style.display = 'none';
        }
        
        function buyItem(itemId) {
            const item = shopItemsData.find(i => i.id === itemId);
            if (!item) return;
            if (coins < item.price) {
                showNotification('❌ 金币不足!', 'error');
                return;
            }
            coins -= item.price;
            if (item.type === 'consumable') {
                inventory[item.id]++;
            } else {
                permanentUpgrades[item.id]++;
            }
            saveSave();
            document.getElementById('shopCoins').textContent = coins;
            updateUI();
            showNotification(`✅ 购买成功!`, 'success');
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault(); break;
                case 'ArrowDown': case 's': case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault(); break;
                case 'ArrowLeft': case 'a': case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault(); break;
                case 'ArrowRight': case 'd': case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault(); break;
                case ' ':
                    if (!isGameOver) isPaused = !isPaused;
                    e.preventDefault(); break;
                case '1': useItem('speed'); break;
                case '2': useItem('slow'); break;
                case '3': useItem('ghost'); break;
                case '4': useItem('shield'); break;
                case '5': useItem('magnet'); break;
                case '6': useItem('double'); break;
            }
        });
        
        loadSave();
        initGame();
    </script>
</body>
