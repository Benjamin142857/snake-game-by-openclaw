<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大冒险 - Snake Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif; color: white;
        }
        h1 {
            margin-bottom: 10px; font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(90deg, #00ff88, #00d4ff, #ff6b6b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .game-wrapper { display: flex; gap: 20px; align-items: flex-start; }
        .game-container { position: relative; }
        #gameCanvas {
            border: 4px solid #0f3460; border-radius: 10px;
            box-shadow: 0 0 30px rgba(15, 52, 96, 0.5);
            background: #0a0a1a;
        }
        .sidebar {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; width: 160px;
        }
        .sidebar h3 { margin-bottom: 10px; color: #00ff88; font-size: 1rem; }
        .stat-item { margin: 8px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .mission-box {
            background: rgba(255,215,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px;
            border: 1px solid #ffd700;
        }
        .status-bar {
            display: flex; gap: 20px; margin-top: 15px; font-size: 1rem;
            background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 8px;
        }
        .game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px; text-align: center;
            display: none; border: 2px solid #e94560;
        }
        .game-over h2 { color: #e94560; margin-bottom: 15px; }
        .btn {
            margin-top: 15px; padding: 12px 30px; font-size: 1rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-green { background: linear-gradient(90deg, #00ff88, #00cc6a); }
        .controls { margin-top: 15px; text-align: center; color: #a0a0a0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇大冒险 v3.0</h1>
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-over" id="gameOver">
                <h2>💀 游戏结束!</h2>
                <p id="finalScore"></p>
                <button class="btn btn-green" onclick="restartGame()">再来一局</button>
            </div>
        </div>
        <div class="sidebar">
            <h3>📊 状态</h3>
            <div class="stat-item"><span>🏆 分数</span><span id="score">0</span></div>
            <div class="stat-item"><span>💰 金币</span><span id="coins">0</span></div>
            <div class="stat-item"><span>🎯 关卡</span><span id="level">1</span></div>
            <div class="mission-box">
                <h3>📋 当前任务</h3>
                <p id="missionText">收集 3 个金币</p>
                <p style="font-size: 0.8rem; color: #ffd700;">进度: <span id="missionProgress">0</span>/3</p>
            </div>
        </div>
    </div>
    <div class="status-bar">
        <div>🏆 分数: <span id="scoreDisplay">0</span></div>
        <div>💰 金币: <span id="coinsDisplay">0</span></div>
        <div>🎯 关卡: <span id="levelDisplay">1</span></div>
    </div>
    <div class="controls">
        <p>🎮 方向键/WASD移动 | 空格暂停</p>
        <button class="btn btn-green" onclick="startGame()">开始游戏</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let coins = 0;
        let level = 1;
        let isPaused = false;
        let isGameOver = false;
        let gameLoop = null;
        
        // 创新玩法系统
        let obstacles = [];      // 🏗️ 障碍物
        let portals = [];        // 🚪 传送门
        let coinItems = [];      // 💰 金币
        let missionProgress = 0; // 🎯 任务进度
        let missionTarget = 3;   // 🎯 任务目标
        
        // 生成障碍物
        function generateObstacles() {
            obstacles = [];
            const obstacleCount = Math.min(level + 2, 10);
            for (let i = 0; i < obstacleCount; i++) {
                let pos;
                do {
                    pos = {
                        x: Math.floor(Math.random() * (tileCount - 4)) + 2,
                        y: Math.floor(Math.random() * (tileCount - 4)) + 2
                    };
                } while (
                    (pos.x >= 8 && pos.x <= 12 && pos.y >= 8 && pos.y <= 12) ||
                    obstacles.some(o => o.x === pos.x && o.y === pos.y)
                );
                obstacles.push(pos);
            }
        }
        
        // 生成传送门
        function generatePortals() {
            portals = [];
            let pos1, pos2;
            do {
                pos1 = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                (pos1.x >= 8 && pos1.x <= 12 && pos1.y >= 8 && pos1.y <= 12) ||
                obstacles.some(o => o.x === pos1.x && o.y === pos1.y)
            );
            do {
                pos2 = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                (pos2.x >= 8 && pos2.x <= 12 && pos2.y >= 8 && pos2.y <= 12) ||
                obstacles.some(o => o.x === pos2.x && o.y === pos2.y) ||
                (pos1.x === pos2.x && pos1.y === pos2.y)
            );
            portals = [pos1, pos2];
        }
        
        // 生成金币
        function spawnCoin() {
            if (coinItems.length >= 5) return;
            let pos;
            do {
                pos = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (
                snake.some(s => s.x === pos.x && s.y === pos.y) ||
                obstacles.some(o => o.x === pos.x && o.y === pos.y) ||
                coinItems.some(c => c.x === pos.x && c.y === pos.y) ||
                (food.x === pos.x && food.y === pos.y) ||
                portals.some(p => p.x === pos.x && p.y === pos.y)
            );
            coinItems.push(pos);
        }
        
        function initGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 0, y: 0 };
            nextDirection = { x: 0, y: 0 };
            score = 0;
            coins = 0;
            level = 1;
            missionProgress = 0;
            missionTarget = 3;
            isPaused = false;
            isGameOver = false;
            coinItems = [];
            
            document.getElementById('score').textContent = score;
            document.getElementById('coins').textContent = coins;
            document.getElementById('level').textContent = level;
            document.getElementById('missionProgress').textContent = missionProgress;
            document.getElementById('gameOver').style.display = 'none';
            
            generateObstacles();
            generatePortals();
            spawnFood();
            for (let i = 0; i < 3; i++) spawnCoin();
            updateUI();
            draw();
        }
        
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (
                snake.some(s => s.x === food.x && s.y === food.y) ||
                obstacles.some(o => o.x === food.x && o.y === food.y) ||
                coinItems.some(c => c.x === food.x && c.y === food.y) ||
                portals.some(p => p.x === food.x && p.y === food.y)
            );
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#1a1a2e';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
            }
            
            // 🏗️ 绘制障碍物
            obstacles.forEach(o => {
                ctx.fillStyle = '#4a4a6a';
                ctx.fillRect(o.x * gridSize + 2, o.y * gridSize + 2, gridSize - 4, gridSize - 4);
                ctx.strokeStyle = '#6a6a8a';
                ctx.lineWidth = 2;
                ctx.strokeRect(o.x * gridSize + 2, o.y * gridSize + 2, gridSize - 4, gridSize - 4);
            });
            
            // 🚪 绘制传送门
            portals.forEach((p, i) => {
                const color = i === 0 ? '#00d4ff' : '#ff6b6b';
                ctx.beginPath();
                ctx.arc(p.x * gridSize + gridSize / 2, p.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();
            });
            
            // 💰 绘制金币
            coinItems.forEach(c => {
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🪙', c.x * gridSize + gridSize / 2, c.y * gridSize + gridSize / 2 + 5);
            });
            
            // 🍎 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 🐍 绘制蛇
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2, 0,
                    segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2, gridSize / 2
                );
                gradient.addColorStop(0, isHead ? '#00ff88' : '#00cc6a');
                gradient.addColorStop(1, isHead ? '#00cc6a' : '#009950');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, isHead ? 8 : 4);
                ctx.fill();
            });
            
            if (isPaused && !isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸️ 暂停', canvas.width / 2, canvas.height / 2);
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('coins').textContent = coins;
            document.getElementById('coinsDisplay').textContent = coins;
            document.getElementById('level').textContent = level;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('missionProgress').textContent = missionProgress;
        }
        
        function checkMissionComplete() {
            if (missionProgress >= missionTarget) {
                level++;
                missionProgress = 0;
                missionTarget = 3 + level;
                document.getElementById('missionText').textContent = `收集 ${missionTarget} 个金币`;
                generateObstacles();
                generatePortals();
                coinItems = [];
                for (let i = 0; i < Math.min(level + 2, 5); i++) spawnCoin();
            }
        }
        
        function update() {
            direction = { ...nextDirection };
            if (direction.x === 0 && direction.y === 0) { draw(); return; }
            
            let head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            // 🚪 传送门检测
            const portalIndex = portals.findIndex(p => p.x === head.x && p.y === head.y);
            if (portalIndex !== -1) {
                const otherPortal = portals[1 - portalIndex];
                head = {
                    x: otherPortal.x + direction.x,
                    y: otherPortal.y + direction.y
                };
            }
            
            // 🏗️ 障碍物碰撞检测
            if (obstacles.some(o => o.x === head.x && o.y === head.y)) {
                gameOver(); return;
            }
            
            // 边界检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver(); return;
            }
            
            // 自身碰撞检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver(); return;
            }
            
            snake.unshift(head);
            
            // 🍎 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                spawnFood();
            } else {
                snake.pop();
            }
            
            // 💰 吃金币
            const coinIndex = coinItems.findIndex(c => c.x === head.x && c.y === head.y);
            if (coinIndex !== -1) {
                coinItems.splice(coinIndex, 1);
                coins++;
                missionProgress++;
                score += 5;
                spawnCoin();
                checkMissionComplete();
            }
            
            updateUI();
            draw();
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = `最终得分: ${score}`;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function startGame() {
            initGame();
            // 设置初始移动方向为向右
            nextDirection = { x: 1, y: 0 };
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                if (!isPaused && !isGameOver) {
                    update();
                } else {
                    draw();
                }
            }, 100);
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault(); break;
                case 'ArrowDown': case 's': case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault(); break;
                case 'ArrowLeft': case 'a': case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault(); break;
                case 'ArrowRight': case 'd': case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault(); break;
                case ' ':
                    if (!isGameOver) isPaused = !isPaused;
                    e.preventDefault(); break;
            }
        });
        
        initGame();
    </script>
</body>
</html>
